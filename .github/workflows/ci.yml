name: Release

# Runs only on version tags — regular commits don't trigger builds.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Flake check
        run: nix flake check
      - name: Build
        run: nix build -L
      # No tailscale on the runner — asserts the binary runs and reports
      # the Error state instead of crashing.
      - name: Smoke test
        run: nix run . -- --status

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Release body = the top (current) section of CHANGELOG.md
      - name: Extract changelog section
        run: awk '/^## /{n++} n==1' CHANGELOG.md > RELEASE_NOTES.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
